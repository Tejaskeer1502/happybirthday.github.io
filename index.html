
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Cutiee ❤️</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
color:#fff;
overflow-x:hidden;
}
.hero{padding:60px 20px;}
h1{font-size:3rem;}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
max-width:1000px;
margin:auto;
}
.gallery img{
width:100%;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}
.card{
background:rgba(255,255,255,.15);
margin:30px auto;
padding:25px;
max-width:700px;
border-radius:20px;
backdrop-filter:blur(8px);
}
button{
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
margin:10px;
}
#yes{background:#4caf50;color:white;}
#no{background:#f44336;color:white;position:relative;}
#response{font-size:22px;margin-top:20px;}
</style>
</head>
<body>
<div class="hero">
<h1>🎉 Happy Birthday Cutiee ❤️❤️ 🎉</h1>
<h2>Love you (as a friend) always 🥰</h2>
<p>Wishing you lots of happiness, laughter, success and unforgettable memories on your special day! 💖</p>
</div>

<div class="gallery">
<img src="photo1.jpeg">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
<img src="photo4.jpeg">
</div>

<div class="card">
<h2>Did you like my effort? 😇</h2>
<button id="yes">Yes 💖</button>
<button id="no">No 😜</button>
<div id="response"></div>
</div>

<script>
document.getElementById("yes").onclick = function(){
document.getElementById("response").innerHTML =
"Yayyy! 🥳 That makes me really happy ❤️";
};

const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", ()=>{
const x = Math.random() * (window.innerWidth - 120);
const y = Math.random() * (window.innerHeight - 60);
noBtn.style.position = "fixed";
noBtn.style.left = x + "px";
noBtn.style.top = y + "px";
});
</script>
</body>
</html>
